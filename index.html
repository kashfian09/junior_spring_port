<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kashfia's Deck</title>

    <!-- Main stylesheet -->
  <link rel="stylesheet" href="style.css" />
  <link href='https://fonts.googleapis.com/css?family=Xanh Mono' rel='stylesheet'>

  <!-- Optional favicon (put your icon file in the same folder) -->
  <link rel="icon" type="image/png" href="Favicon.png">
  
</head>
<body>
    
    <!-- NAVBAR -->
  <header>
    <nav class="navbar">
      <div class="navbar-left">
        <!-- Replace logo.png with your own image file -->
        <img src="Favicon.png" alt="Logo" />
        <i><h1 class ="deck">Kashfia's Deck</h1></i>
      </div>

      <ul class="navbar-right">
        <li><a href="index.html">Home</a></li>
        <li><a href="aboutme.html">About Me</a></li>
        <li><a href="works.html">Works</a></li>
        <li><a href="contacts.html">Contacts</a></li>
      </ul>
    </nav>
  </header>

  <!-- MAIN CONTENT -->
  <main class="home-card">

    <!-- Cards -->
    <div class="image-container">
      <div class="card">
        <img src="Ace.png" alt="Ace of diamonds">
        <p class="text">Home</p>
      </div>

      <div class="card">
        <img src="2.png" alt="2 of diamonds">
        <p class="text">About Me</p>
      </div>

      <div class="card">
        <img src="3.png" alt="3 of diamonds">
        <p class="text">Works</p>
      </div>

      <div class="card">
        <img src="4.png" alt="4 of diamonds">
        <p class="text">Contacts</p>
      </div>
    </div>
    <img src="PokerChips.png" alt="Poker Chips">
  </main>

    <!-- FOOTER -->
  <footer class="footer">
    <p class="foottext">© <span id="year"></span> Kashfia Nayim | Junior Spring Portfolio</p>
  </footer>

  <script>
    // Auto-updates the year in the footer
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>


</body>
</html>
